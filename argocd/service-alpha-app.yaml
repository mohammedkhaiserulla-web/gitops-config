apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-alpha
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mohammedkhaiserulla-web/gitops-config.git
    targetRevision: HEAD
    path: apps/service-alpha
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
