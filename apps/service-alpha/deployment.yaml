apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-alpha
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-alpha
  template:
    metadata:
      labels:
        app: service-alpha
    spec:
      containers:
        - name: service-alpha
          image: 554716176680.dkr.ecr.ap-south-1.amazonaws.com/service-alpha:6f960a94
          ports:
            - containerPort: 5000
          env:
            - name: SERVICE_NAME
              value: "service-alpha"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: service-alpha-secret
                  key: api_key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: service-alpha-secret
                  key: db_password
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "service-alpha-secrets"
---
apiVersion: v1
kind: Service
metadata:
  name: service-alpha
  namespace: default
spec:
  selector:
    app: service-alpha
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
