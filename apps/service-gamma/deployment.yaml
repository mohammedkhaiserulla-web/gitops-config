apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-gamma
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-gamma
  template:
    metadata:
      labels:
        app: service-gamma
    spec:
      containers:
        - name: service-gamma
          image: 554716176680.dkr.ecr.ap-south-1.amazonaws.com/service-gamma:4bd96d36
          ports:
            - containerPort: 5000
          env:
            - name: SERVICE_NAME
              value: "service-gamma"
---
apiVersion: v1
kind: Service
metadata:
  name: service-gamma
  namespace: default
spec:
  selector:
    app: service-gamma
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
